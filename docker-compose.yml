version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      JWT_SECRET: dev_secret_change_in_prod
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000
      DB_PATH: /data/chat.db
    volumes:
      - ./backend/src:/app/src
      - chat-db:/data
    networks:
      - chat-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - chat-network

volumes:
  chat-db:

networks:
  chat-network:
    driver: bridge
