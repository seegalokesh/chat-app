<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Real-time chat application" />
    <meta name="theme-color" content="#1a1d21" />

    <title>ChatApp</title>

    <!-- Favicon as inline SVG data URI — no extra file needed -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>"
    />

    <!-- Preconnect for any CDN fonts you might add later -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
  </head>
  <body>
    <noscript>
      <div style="
        font-family: system-ui, sans-serif;
        padding: 40px;
        text-align: center;
        background: #1a1d21;
        color: #e3e5e8;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
      ">
        <h1>JavaScript required</h1>
        <p>ChatApp needs JavaScript to run. Please enable it in your browser settings.</p>
      </div>
    </noscript>

    <div id="root"></div>

    <!-- Vite injects the script tag automatically during build -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
